<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yumori 3D — 霊の湯屋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#e8b65a; --gold-soft:#f4d894; --cream:#f4ecd9; --cream-dim:#c4b89f;
    --teal:#5fc3b0; --coral:#ec9170; --rose:#d96a6a; --panel:#2b2046; --panel2:#352956;
    --line:rgba(244,236,217,.16);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; overflow:hidden; background:#0e0a1c}
  body{font-family:"Zen Maru Gothic",system-ui,sans-serif; color:var(--cream); user-select:none}
  #app{position:fixed; inset:0}
  #canvas-wrap{position:absolute; inset:0}
  canvas{display:block}

  /* HUD */
  #hud{position:absolute; top:14px; left:14px; right:14px; display:flex; gap:14px;
    align-items:center; pointer-events:none; flex-wrap:wrap}
  .meters{flex:1; min-width:180px; max-width:340px; display:flex; flex-direction:column; gap:8px;
    background:rgba(14,10,28,.5); border:1px solid var(--line); border-radius:13px; padding:10px 13px;
    backdrop-filter:blur(3px)}
  .mlabel{display:flex; justify-content:space-between; font-size:10.5px; color:var(--cream-dim);
    letter-spacing:.04em; margin-bottom:3px}
  .bar{height:7px; border-radius:6px; background:rgba(244,236,217,.12); overflow:hidden}
  .bar>span{display:block; height:100%; border-radius:6px; transition:width .45s ease, background .45s ease}
  .tok{background:rgba(14,10,28,.5); border:1px solid var(--line); border-radius:13px; padding:8px 14px;
    text-align:center; backdrop-filter:blur(3px)}
  .tok b{font-family:"Shippori Mincho",serif; font-size:20px; color:var(--gold-soft); line-height:1}
  .tok span{display:block; font-size:9.5px; color:var(--cream-dim); letter-spacing:.1em}

  /* proximity prompt */
  #prompt{position:absolute; left:50%; bottom:120px; transform:translateX(-50%);
    background:rgba(14,10,28,.72); border:1px solid var(--line); border-radius:11px;
    padding:9px 16px; font-size:14px; color:var(--cream); opacity:0; transition:opacity .2s;
    pointer-events:none; text-align:center; backdrop-filter:blur(3px); white-space:nowrap}
  #prompt.on{opacity:1}
  #prompt b{color:var(--gold-soft)}

  /* mobile controls */
  #controls{position:absolute; inset:0; pointer-events:none; display:none}
  #stick{position:absolute; left:24px; bottom:30px; width:118px; height:118px; border-radius:50%;
    background:rgba(20,14,38,.4); border:1.5px solid var(--line); pointer-events:auto;
    touch-action:none}
  #knob{position:absolute; left:50%; top:50%; width:50px; height:50px; margin:-25px 0 0 -25px;
    border-radius:50%; background:rgba(232,182,90,.6); box-shadow:0 0 16px rgba(232,182,90,.4)}
  #interactBtn{position:absolute; right:26px; bottom:46px; width:88px; height:88px; border-radius:50%;
    background:rgba(232,182,90,.18); border:2px solid var(--gold); color:var(--gold-soft);
    font-family:"Shippori Mincho",serif; font-size:14px; pointer-events:auto; touch-action:none;
    display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.3}

  .hint{position:absolute; left:50%; bottom:16px; transform:translateX(-50%); font-size:11px;
    color:var(--cream-dim); letter-spacing:.04em; pointer-events:none; text-align:center}

  /* overlays */
  .overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:20px; background:rgba(10,7,20,.74); backdrop-filter:blur(5px); z-index:10}
  .overlay.hidden{display:none}
  .card{width:100%; max-width:440px; background:var(--panel); border:1px solid var(--line);
    border-radius:18px; padding:22px}
  .who{font-family:"Shippori Mincho",serif; font-size:19px; color:var(--gold-soft)}
  .kind{font-size:11.5px; color:var(--cream-dim); letter-spacing:.04em; margin-bottom:12px}
  .say{font-size:14.5px; line-height:1.7}
  .clue{display:flex; gap:9px; align-items:flex-start; font-size:13.5px; line-height:1.55; margin-top:9px}
  .clue::before{content:""; flex:0 0 auto; width:6px; height:6px; border-radius:50%; background:var(--teal);
    margin-top:7px; box-shadow:0 0 7px var(--teal)}
  .choose-h{font-size:10.5px; letter-spacing:.12em; color:var(--cream-dim); margin:16px 0 9px}
  .opts{display:flex; gap:8px; flex-wrap:wrap}
  .opt{flex:1 1 46%; cursor:pointer; text-align:left; background:var(--panel2); border:1.5px solid transparent;
    border-radius:11px; padding:10px 11px; color:var(--cream); font-family:inherit; transition:.15s}
  .opt:hover{border-color:rgba(232,182,90,.4)} .opt.sel{border-color:var(--gold); background:#3d3060}
  .opt b{display:block; font-size:13.5px; margin-bottom:2px} .opt span{font-size:11px; color:var(--cream-dim)}
  .heats{display:flex; gap:8px; margin-top:9px}
  .heat{flex:1; cursor:pointer; text-align:center; padding:10px 4px; border-radius:10px; background:var(--panel2);
    border:1.5px solid transparent; color:var(--cream); font-family:inherit; font-size:13.5px; transition:.15s}
  .heat.sel{border-color:var(--gold); background:#3d3060}
  .result-tag{font-family:"Shippori Mincho",serif; font-size:15px; margin-bottom:9px}
  .good{color:var(--teal)} .mid{color:var(--gold-soft)} .bad{color:var(--rose)}
  .ledger{display:flex; gap:18px; margin-top:13px; font-size:12.5px; color:var(--cream-dim)}
  .ledger b{font-family:"Shippori Mincho",serif} .up{color:var(--teal)} .down{color:var(--rose)}
  .btns{display:flex; gap:10px; margin-top:18px}
  .btn{flex:1; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; padding:12px;
    border-radius:11px; border:1.5px solid var(--gold); background:transparent; color:var(--gold-soft); transition:.15s}
  .btn:hover{background:rgba(232,182,90,.1)} .btn:disabled{opacity:.4; cursor:not-allowed}
  .btn.primary{background:var(--gold); color:#2a1d08; border-color:var(--gold)}
  .btn.quiet{border-color:var(--line); color:var(--cream-dim)}
  .small{font-size:11.5px; color:var(--cream-dim); margin-top:12px; line-height:1.5}

  .start-title .jp{font-family:"Shippori Mincho",serif; font-size:14px; color:var(--gold);
    letter-spacing:.5em; text-align:center}
  .start-title .en{font-family:"Shippori Mincho",serif; font-size:30px; font-weight:800; text-align:center; margin-top:4px}
  .start-title .sub{font-size:13px; color:var(--cream-dim); text-align:center; margin-top:8px; line-height:1.7}
  .end-title{font-family:"Shippori Mincho",serif; font-size:24px; text-align:center; margin-bottom:12px}
  .end-body{font-size:14.5px; line-height:1.75; text-align:center}
  .end-stat{font-size:12px; color:var(--cream-dim); text-align:center; margin-top:14px}

  @media (max-width:520px){ .start-title .en{font-size:25px} }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap"></div>

  <div id="hud">
    <div class="meters">
      <div>
        <div class="mlabel"><span>家への道</span><span id="goalTxt">0 / 40</span></div>
        <div class="bar"><span id="goalBar" style="width:0%;background:var(--teal)"></span></div>
      </div>
      <div>
        <div class="mlabel"><span>あなたの名前</span><span id="nameTxt">100</span></div>
        <div class="bar"><span id="nameBar" style="width:100%;background:var(--gold)"></span></div>
      </div>
    </div>
    <div class="tok"><b id="tokNum">0</b><span>湯札</span></div>
  </div>

  <div id="prompt"></div>

  <div id="controls">
    <div id="stick"><div id="knob"></div></div>
    <div id="interactBtn">応対</div>
  </div>
  <div class="hint" id="hint">WASD / 矢印キーで移動 · 霊に近づいて E で応対</div>

  <!-- bath / greed modal -->
  <div id="modal" class="overlay hidden"><div class="card" id="modalCard"></div></div>

  <!-- start -->
  <div id="start" class="overlay">
    <div class="card">
      <div class="start-title">
        <div class="jp">湯守</div>
        <div class="en">Yumori 3D</div>
        <div class="sub">霊の湯屋を歩く。客人それぞれに正しい湯を仕立て、<br>湯札を貯めて家へ帰ろう——でも、夜のあいだに自分の名前を失わないように。</div>
      </div>
      <div class="btns"><button class="btn primary" id="enterBtn">湯屋へ入る</button></div>
      <div class="small" style="text-align:center">PC：WASD か矢印キーで移動、E キーで応対。<br>スマホ：左下のスティックで移動、右下のボタンで応対。</div>
    </div>
  </div>

  <!-- end -->
  <div id="end" class="overlay hidden"><div class="card" id="endCard"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============ data ============ */
const SPIRITS = [
  { id:'moss', name:'苔背', kind:'古き森の霊', color:0x6f8f57, big:false, pos:[-7,-3.5],
    arrival:'重たい緑の影がのそりと入ってくる。湿った土をしたたらせ、長い根を引きずって。',
    clues:['湿った土と、百年ものの古い樹皮の匂いがする。','震えている——冷えが根の奥深くまで入り込んでいる。'],
    herb:'sweetroot', heat:'warm',
    story:'温もりが苔背の根に染み込み、長い、苔むしたため息がもれる。「百年ぶりに春を感じた」と低くつぶやき、あなたの手のひらに緑の種をひとつ置いていく。' },
  { id:'ash', name:'灰雀', kind:'焼け焦げた小鳥の霊', color:0xc2643c, big:false, pos:[6,-6],
    arrival:'一羽の小鳥が低く舞い込んでくる。羽の先からは、まだ細い煙が立ちのぼっている。',
    clues:['羽の先が、まだくすぶっている。','熱に触れると身を縮め、小さく鳴く。'],
    herb:'mintleaf', heat:'cool',
    story:'灰雀が涼しい薄荷の湯に身を沈めると、残り火がようやく静まる。澄んだ声でひと鳴き礼を言い、梁の上へ飛んでいって身を乾かす。' },
  { id:'lantern', name:'灯火童', kind:'揺らめく炎の霊', color:0xe8b65a, big:false, pos:[7,4],
    arrival:'炎でできた子どもが、おずおずと近づいてくる。不安な思いがよぎるたび、ちらちらと明滅しながら。',
    clues:['小さな炎が震えている——何かを怖がっている。','温もりを欲しがっているが、いちばん柔らかいものだけ。決して強すぎてはいけない。'],
    herb:'dreamlily', heat:'warm',
    story:'夢百合の安らぎに包まれて、灯火童はようやく穏やかに、明るく燃える。柔らかな感謝の光を湯屋じゅうに灯してから、ふわりと家へ帰っていく。' },
  { id:'brim', name:'満ちる者', kind:'塞がれた河の神', color:0x6b5d4a, big:true, pos:[-6.5,5.5],
    arrival:'巨大で悪臭を放つ影が、戸口からあふれ出てくる——河の泥、よどんだ砂、錆びた人間のごみを引きずって。',
    clues:['瓶や針金、百年分の汚れで詰まりきっている。','強く、熱い湯で一気に洗い流してやる必要がある。'],
    herb:'saltbloom', heat:'hot',
    story:'自転車の枠、いくつもの瓶、もつれた釣り糸を引き出すと——汚れがはがれ落ち、輝く河の神が現れる。奔流のように笑い、あなたに金を降らせ、清らかに夜空へと昇っていく。' },
];
const GREED = { id:'hollow', name:'虚ろ客', kind:'払うのは金、礼ではない', color:0xece6dc, pos:[8,-1],
  arrival:'青白い面をつけた背の高い影が、音もなく滑り込んでくる。片手を広げると、そこは金で満ちている。湯はいらない。ただ、留まれ、受け取れ、また留まれ、と手招きする。' };

const HERBS = [
  {id:'sweetroot',name:'甘根',desc:'土の性・癒やし'},
  {id:'mintleaf', name:'薄荷',desc:'涼・鎮める'},
  {id:'saltbloom',name:'塩花', desc:'洗う・清める'},
  {id:'dreamlily',name:'夢百合',desc:'柔らか・なだめる'},
];
const HEATS = [{id:'cool',name:'冷'},{id:'warm',name:'温'},{id:'hot',name:'熱'}];

let state;
function resetState(){ state = { tokens:0, name:100, goal:40, served:[], busy:false, ended:false }; }
resetState();

/* ============ three.js scene ============ */
let scene, camera, renderer, clock, player, gate, boiler;
const spiritMeshes = [];
const lanternGlows = [];
let camLerp = new THREE.Vector3();

function buildScene(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x140e26);
  scene.fog = new THREE.FogExp2(0x140e26, 0.045);

  camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0, 10, 13);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  // lights
  scene.add(new THREE.HemisphereLight(0x4a3f6b, 0x161022, 0.55));
  const amb = new THREE.AmbientLight(0xb98a4a, 0.35); scene.add(amb);
  const moon = new THREE.DirectionalLight(0x8a7fc0, 0.4); moon.position.set(6,14,4); scene.add(moon);

  // floor
  const floorMat = new THREE.MeshStandardMaterial({ color:0x3a2a22, roughness:0.9, metalness:0.05 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(28,28), floorMat);
  floor.rotation.x = -Math.PI/2; scene.add(floor);
  // plank seams
  const seamMat = new THREE.MeshStandardMaterial({ color:0x2a1d18, roughness:1 });
  for(let i=-6;i<=6;i++){
    const s = new THREE.Mesh(new THREE.BoxGeometry(28,0.02,0.06), seamMat);
    s.position.set(0,0.011,i*2); scene.add(s);
  }

  // perimeter low walls + pillars
  const woodMat = new THREE.MeshStandardMaterial({ color:0x4a3324, roughness:0.85 });
  const wallSpecs = [[0,-13,28,1.6,1],[0,13,28,1.6,1],[-13,0,1,1.6,28],[13,0,1,1.6,28]];
  wallSpecs.forEach(([x,z,w,h,d])=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), woodMat);
    wall.position.set(x,h/2,z); scene.add(wall);
  });
  for(const [x,z] of [[-10,-10],[10,-10],[-10,10],[10,10],[0,-12.4],[0,12.4]]){
    const p = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.55,5,12), woodMat);
    p.position.set(x,2.5,z); scene.add(p);
  }

  // bath pools
  makePool(-2.5,-2.5,2.4); makePool(3,3,2.6); makePool(-4,4,2.0);

  // lanterns (warm point lights)
  for(const [x,z] of [[-9,-3],[9,-3],[-3,9],[5,-9],[0,0]]) makeLantern(x,z);

  // torii exit gate
  gate = makeTorii(0,11.5);

  // boiler (rest spot)
  boiler = makeBoiler(-11,-6);

  // spirits
  SPIRITS.forEach(s=>{ const m = makeSpirit(s); spiritMeshes.push(m); scene.add(m); });
  // greed guest
  const gm = makeSpirit(GREED, true); gm.userData.greed = true; spiritMeshes.push(gm); scene.add(gm);

  // player
  player = makePlayer(); player.position.set(0,0,8); scene.add(player);

  addEventListener('resize', onResize);
}

function makePool(x,z,r){
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(r+0.25,r+0.3,0.5,28),
    new THREE.MeshStandardMaterial({color:0x4a3324, roughness:0.8}));
  rim.position.set(x,0.25,z); scene.add(rim);
  const water = new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.42,28),
    new THREE.MeshStandardMaterial({color:0x2f7d70, emissive:0x1f8a78, emissiveIntensity:0.6,
      transparent:true, opacity:0.85, roughness:0.3}));
  water.position.set(x,0.4,z); scene.add(water);
}

function makeLantern(x,z){
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,3.4,8),
    new THREE.MeshStandardMaterial({color:0x2c1d14}));
  post.position.set(x,1.7,z); scene.add(post);
  const paper = new THREE.Mesh(new THREE.SphereGeometry(0.42,16,12),
    new THREE.MeshStandardMaterial({color:0xe8b65a, emissive:0xe8a23a, emissiveIntensity:1.0}));
  paper.scale.y = 1.3; paper.position.set(x,3.5,z); scene.add(paper);
  const light = new THREE.PointLight(0xffb24d, 0.9, 11, 2);
  light.position.set(x,3.6,z); scene.add(light);
  lanternGlows.push({paper, light, base:0.9, phase:Math.random()*6});
}

function makeTorii(x,z){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color:0xb8442e, roughness:0.7, emissive:0x000000});
  const pL = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,5,12), mat); pL.position.set(-2.2,2.5,0);
  const pR = pL.clone(); pR.position.x = 2.2;
  const top = new THREE.Mesh(new THREE.BoxGeometry(6.4,0.5,0.6), mat); top.position.set(0,5.1,0);
  const tie = new THREE.Mesh(new THREE.BoxGeometry(5.4,0.35,0.45), mat); tie.position.set(0,3.9,0);
  g.add(pL,pR,top,tie); g.position.set(x,0,z); g.userData.mat = mat; scene.add(g);
  return g;
}

function makeBoiler(x,z){
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.3,2,16),
    new THREE.MeshStandardMaterial({color:0x3a2a20, roughness:0.9}));
  body.position.y = 1;
  const glow = new THREE.Mesh(new THREE.SphereGeometry(0.5,12,10),
    new THREE.MeshStandardMaterial({color:0xff7b3a, emissive:0xff6a2a, emissiveIntensity:1.2}));
  glow.position.y = 0.5;
  const l = new THREE.PointLight(0xff6a2a,0.7,6,2); l.position.set(0,0.8,0);
  g.add(body,glow,l); g.position.set(x,0,z); scene.add(g);
  return g;
}

function makeSpirit(data, isGreed){
  const g = new THREE.Group();
  const r = data.big ? 1.5 : 0.95;
  if(isGreed){
    const bodyMat = new THREE.MeshStandardMaterial({color:0x3a3252, roughness:0.7});
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.85,2.6,16), bodyMat);
    body.position.y = 1.3; g.add(body);
    const mask = new THREE.Mesh(new THREE.SphereGeometry(0.5,16,14),
      new THREE.MeshStandardMaterial({color:0xefe9dc, emissive:0x2a2438, emissiveIntensity:0.2}));
    mask.scale.set(0.85,1.05,0.55); mask.position.set(0,2.4,0.35); g.add(mask);
    for(const ex of [-0.18,0.18]){
      const e = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),
        new THREE.MeshStandardMaterial({color:0x2a2438}));
      e.position.set(ex,2.45,0.78); g.add(e);
    }
  } else {
    const bodyMat = new THREE.MeshStandardMaterial({color:data.color,
      emissive:data.color, emissiveIntensity:0.28, roughness:0.55});
    const body = new THREE.Mesh(new THREE.SphereGeometry(r,24,20), bodyMat);
    body.scale.y = 0.92; body.position.y = r*0.92; g.add(body);
    for(const ex of [-r*0.32, r*0.32]){
      const white = new THREE.Mesh(new THREE.SphereGeometry(r*0.16,12,12),
        new THREE.MeshStandardMaterial({color:0xfdfaf2}));
      white.position.set(ex, r*1.05, r*0.78); g.add(white);
      const pup = new THREE.Mesh(new THREE.SphereGeometry(r*0.08,10,10),
        new THREE.MeshStandardMaterial({color:0x23202c}));
      pup.position.set(ex, r*1.05, r*0.9); g.add(pup);
    }
    if(data.id==='lantern'){ const l=new THREE.PointLight(0xffcf6a,0.8,6,2); l.position.y=1.2; g.add(l); }
  }
  g.position.set(data.pos[0], 0, data.pos[1]);
  g.userData = Object.assign({}, g.userData, { data, home:[data.pos[0],data.pos[1]],
    bob:Math.random()*6, served:false, leaving:false, greed:!!isGreed });
  return g;
}

function makePlayer(){
  const g = new THREE.Group();
  const robe = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.46,1.0,14),
    new THREE.MeshStandardMaterial({color:0xc0413e, roughness:0.7}));
  robe.position.y = 0.55; g.add(robe);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32,18,16),
    new THREE.MeshStandardMaterial({color:0xf0c9a0, roughness:0.8}));
  head.position.y = 1.25; g.add(head);
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.34,18,16),
    new THREE.MeshStandardMaterial({color:0x2a2230, roughness:0.9}));
  hair.scale.set(1,0.7,1); hair.position.y = 1.42; g.add(hair);
  g.userData.dir = 0;
  return g;
}

function onResize(){
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

/* ============ input ============ */
const keys = {};
addEventListener('keydown', e=>{
  const k = e.key.toLowerCase(); keys[k] = true;
  if(k==='e'||k===' '||k==='enter'){ e.preventDefault(); tryInteract(); }
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

let joy = {active:false, x:0, z:0};
const stick = document.getElementById('stick'), knob = document.getElementById('knob');
function stickStart(e){ joy.active=true; stickMove(e); }
function stickMove(e){
  if(!joy.active) return;
  const t = e.touches ? e.touches[0] : e;
  const r = stick.getBoundingClientRect();
  let dx = t.clientX - (r.left+r.width/2), dy = t.clientY - (r.top+r.height/2);
  const max = 42, d = Math.hypot(dx,dy);
  if(d>max){ dx*=max/d; dy*=max/d; }
  knob.style.transform = `translate(${dx}px,${dy}px)`;
  joy.x = dx/max; joy.z = dy/max;
}
function stickEnd(){ joy.active=false; joy.x=0; joy.z=0; knob.style.transform='translate(0,0)'; }
stick.addEventListener('touchstart', e=>{e.preventDefault();stickStart(e)}, {passive:false});
stick.addEventListener('touchmove', e=>{e.preventDefault();stickMove(e)}, {passive:false});
stick.addEventListener('touchend', stickEnd);
document.getElementById('interactBtn').addEventListener('touchstart', e=>{e.preventDefault();tryInteract()}, {passive:false});
document.getElementById('interactBtn').addEventListener('click', tryInteract);

if('ontouchstart' in window){
  document.getElementById('controls').style.display='block';
  document.getElementById('hint').textContent='スティックで移動 · 霊に近づいてボタンで応対';
}

/* ============ interaction ============ */
function dist2(a, x, z){ const dx=a.position.x-x, dz=a.position.z-z; return Math.hypot(dx,dz); }
function nearest(){
  const px=player.position.x, pz=player.position.z;
  let best=null, bd=2.8;
  for(const m of spiritMeshes){
    if(m.userData.served || m.userData.leaving || !m.visible) continue;
    const d = dist2(m,px,pz);
    if(d<bd){ bd=d; best={type:m.userData.greed?'greed':'spirit', ref:m, d}; }
  }
  const dg = dist2(gate,px,pz);
  if(state.tokens>=state.goal && dg<3.2 && (!best||dg<bd)){ best={type:'gate',d:dg}; }
  const db = dist2(boiler,px,pz);
  if(db<2.6 && (!best||db<bd) && state.name<80){ best={type:'boiler',d:db}; }
  return best;
}
function updatePrompt(){
  const p = document.getElementById('prompt');
  if(state.busy||state.ended){ p.classList.remove('on'); return; }
  const n = nearest();
  if(!n){ p.classList.remove('on'); return; }
  const key = ('ontouchstart' in window) ? '応対' : 'E';
  if(n.type==='gate') p.innerHTML = `<b>${key}</b> · 湯札を清算して、ここを去る`;
  else if(n.type==='boiler') p.innerHTML = `<b>${key}</b> · 釜のそばで休み、自分を少し取り戻す`;
  else p.innerHTML = `<b>${key}</b> · <b>${n.ref.userData.data.name}</b> をもてなす`;
  p.classList.add('on');
}
function tryInteract(){
  if(state.busy||state.ended) return;
  const n = nearest(); if(!n) return;
  if(n.type==='spirit') openSpirit(n.ref);
  else if(n.type==='greed') openGreed(n.ref);
  else if(n.type==='boiler') doRest();
  else if(n.type==='gate') leave();
}

/* ============ meters ============ */
function clamp(n){ return Math.max(0,Math.min(100,n)); }
function changeName(d){ state.name = clamp(state.name+d); if(state.name<=0 && !state.ended) endGame('forgotten'); }
function updateHUD(){
  document.getElementById('tokNum').textContent = state.tokens;
  document.getElementById('goalTxt').textContent = Math.min(state.tokens,state.goal)+' / '+state.goal;
  document.getElementById('goalBar').style.width = Math.min(100, state.tokens/state.goal*100)+'%';
  document.getElementById('nameTxt').textContent = state.name;
  const nb = document.getElementById('nameBar');
  nb.style.width = state.name+'%';
  nb.style.background = state.name>60?'var(--gold)':state.name>30?'var(--coral)':'var(--rose)';
  // glow torii when ready
  if(gate) gate.userData.mat.emissive.setHex(state.tokens>=state.goal ? 0x5a1a10 : 0x000000);
}

/* ============ modal flows ============ */
const modal = document.getElementById('modal'), modalCard = document.getElementById('modalCard');
function showModal(html){ modalCard.innerHTML = html; modal.classList.remove('hidden'); state.busy=true; }
function closeModal(){ modal.classList.add('hidden'); state.busy=false; }

let pick = {herb:null, heat:null, spirit:null};
function openSpirit(m){
  const s = m.userData.data; pick = {herb:null, heat:null, spirit:m};
  showModal(`
    <div class="who">客人がやってくる</div><div class="kind">${s.kind}</div>
    <div class="say">${s.arrival}</div>
    ${s.clues.map(c=>`<div class="clue">${c}</div>`).join('')}
    <div class="btns"><button class="btn primary" onclick="toBath()">湯を仕立てに行く</button></div>`);
}
function toBath(){
  const s = pick.spirit.userData.data;
  const herbs = HERBS.map(h=>`<button class="opt" data-h="${h.id}" onclick="selHerb('${h.id}')"><b>${h.name}</b><span>${h.desc}</span></button>`).join('');
  const heats = HEATS.map(h=>`<button class="heat" data-t="${h.id}" onclick="selHeat('${h.id}')">${h.name}</button>`).join('');
  showModal(`
    <div class="who">${s.name} のために湯を仕立てる</div>
    <div class="choose-h">薬草をひとつ加える</div><div class="opts">${herbs}</div>
    <div class="choose-h">湯加減を決める</div><div class="heats">${heats}</div>
    <div class="btns"><button class="btn primary" id="pourBtn" disabled onclick="pour()">湯を注ぐ</button></div>
    <div class="small">湯を仕立てるたび、名前が少し削られる。働くとは、いつもそういうもの。</div>`);
}
function selHerb(id){ pick.herb=id; document.querySelectorAll('[data-h]').forEach(b=>b.classList.toggle('sel',b.dataset.h===id)); checkReady(); }
function selHeat(id){ pick.heat=id; document.querySelectorAll('[data-t]').forEach(b=>b.classList.toggle('sel',b.dataset.t===id)); checkReady(); }
function checkReady(){ document.getElementById('pourBtn').disabled = !(pick.herb&&pick.heat); }
function pour(){
  const m = pick.spirit, s = m.userData.data;
  const herbOK = pick.herb===s.herb, heatOK = pick.heat===s.heat;
  let tier, gain, cost, body, tag, cls;
  if(herbOK&&heatOK){ tier='good'; gain=s.big?18:10; cost=4; tag='きれいに清められた。'; cls='good'; body=s.story; }
  else if(herbOK||heatOK){ tier='mid'; gain=4; cost=5; tag='惜しい、あと一歩。'; cls='mid';
    body=`${s.name} はしばらく浸かって少し落ち着いたが、癒えきってはいない。${herbOK?'湯加減が違った':'薬草が違った'}のがわかる。`; }
  else { tier='bad'; gain=1; cost=6; tag='この湯は違っていた。'; cls='bad';
    body=`${s.name} は湯から身を引き、礼儀正しく少し我慢したが、痛みを抱えたまま去っていった。読み違えたのだ。`; }
  state.tokens += gain;
  if(tier==='good'){ m.userData.served=true; m.userData.leaving=true; }
  changeName(-cost); updateHUD();
  const done = state.ended ? '' : `<div class="btns"><button class="btn primary" onclick="closeModal()">もてなしを終える</button></div>`;
  showModal(`<div class="result-tag ${cls}">${tag}</div><div class="say">${body}</div>
    <div class="ledger"><div>湯札 <b class="up">+${gain}</b></div><div>名前 <b class="down">−${cost}</b></div></div>${done}`);
  if(state.ended) setTimeout(closeModal, 30);
}

function openGreed(m){
  pick.spirit = m;
  showModal(`<div class="who">${GREED.name}</div><div class="kind">${GREED.kind}</div>
    <div class="say">${GREED.arrival}</div>
    <div class="btns">
      <button class="btn primary" onclick="greed('take')">金を受け取る</button>
      <button class="btn quiet" onclick="greed('send')">送り返す</button></div>
    <div class="small">楽な金は、真面目な働きよりずっと早い——だが、それはあなたを喰らう。</div>`);
}
function greed(choice){
  const m = pick.spirit;
  let body, tag, cls, ledger;
  if(choice==='take'){ state.tokens+=20; changeName(-15); tag='金を受け取った。'; cls='mid';
    body='虚ろ客は手のひらに金貨を注ぎ込む。一週間の真面目な働きより多いほどだ。けれど湯屋は一段暗くなり、ほかの霊たちは後ずさり、あなたは最初にこの戸をくぐった子どもから、また少し遠ざかる。';
    ledger=`<div>湯札 <b class="up">+20</b></div><div>名前 <b class="down">−15</b></div>`;
    m.userData.served=true; m.userData.leaving=true; }
  else { changeName(+4); tag='そっと送り返した。'; cls='good';
    body='あなたは一礼し、その手を自らの金の上にそっと閉じさせ、闇の中へと導いた。虚ろ客は音もなく去っていく。湯屋は少し暖かくなり、あなたも——ほんの少し——なぜここへ来たのかを思い出す。';
    ledger=`<div>湯札 <b>+0</b></div><div>名前 <b class="up">+4</b></div>`;
    m.userData.served=true; m.userData.leaving=true; }
  updateHUD();
  const done = state.ended ? '' : `<div class="btns"><button class="btn primary" onclick="closeModal()">終える</button></div>`;
  showModal(`<div class="result-tag ${cls}">${tag}</div><div class="say">${body}</div><div class="ledger">${ledger}</div>${done}`);
  if(state.ended) setTimeout(closeModal,30);
}

function doRest(){
  state.name = Math.min(80, state.name+10); updateHUD();
  showModal(`<div class="who">釜のそばで休む</div>
    <div class="say">釜の温もりに寄りかかって腰を下ろし、ささやかなことを思い出す——ある通り、ある声、母がくれた名前。あなたの一片が、戻ってくる。</div>
    <div class="ledger"><div>名前 <b class="up">+10</b></div></div>
    <div class="btns"><button class="btn primary" onclick="closeModal()">立ち上がる</button></div>`);
}

function leave(){ endGame(state.name>=60?'good':'bittersweet'); }

/* ============ endings ============ */
function endGame(type){
  state.ended = true; state.busy = true; closeModal();
  let title, body;
  if(type==='good'){ title='自分の名前を思い出した。';
    body='最後の湯札を置き、自分の名前を声に出す——それはまだ、ちゃんと自分のものだった。戸が滑り開き、外は明るくありふれた朝。あなたは欠けることなく、霊の世界から歩き出た。'; }
  else if(type==='bittersweet'){ title='去っていった——あなたの、大半が。';
    body='借りは返し、戸の外は朝だった。けれど何かが湯気の中に残された——ひとつの記憶、ひとかけらの柔らかさ、まるごとのあなた。家には帰れたのに、どこか軽すぎる。'; }
  else { title='湯屋が、あなたを留めた。';
    body='長い夜のどこかで、あなたはいつしか、なぜここを出たかったのかを忘れてしまった。前掛けを締め、次の湯を仕立てに行く——満ち足りた気持ちで。それこそが、この場所の恐ろしさだ。'; }
  document.getElementById('endCard').innerHTML = `
    <div class="end-title">${title}</div><div class="end-body">${body}</div>
    <div class="end-stat">もてなした霊：${state.served.length}体</div>
    <div class="btns"><button class="btn primary" onclick="restart()">もう一度</button></div>`;
  document.getElementById('end').classList.remove('hidden');
}
function restart(){
  resetState();
  spiritMeshes.forEach(m=>{
    m.userData.served=false; m.userData.leaving=false; m.visible=true;
    m.position.set(m.userData.home[0],0,m.userData.home[1]);
    m.scale.set(1,1,1);
  });
  player.position.set(0,0,8);
  updateHUD();
  document.getElementById('end').classList.add('hidden');
}

/* ============ loop ============ */
const SPEED = 5.2, BOUND = 11.5;
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // movement
  if(!state.busy && !state.ended){
    let mx=0, mz=0;
    if(keys['w']||keys['arrowup']) mz-=1;
    if(keys['s']||keys['arrowdown']) mz+=1;
    if(keys['a']||keys['arrowleft']) mx-=1;
    if(keys['d']||keys['arrowright']) mx+=1;
    if(joy.active){ mx=joy.x; mz=joy.z; }
    const len = Math.hypot(mx,mz);
    if(len>0.05){
      mx/=len||1; mz/=len||1;
      player.position.x = Math.max(-BOUND, Math.min(BOUND, player.position.x + mx*SPEED*dt));
      player.position.z = Math.max(-BOUND, Math.min(BOUND, player.position.z + mz*SPEED*dt));
      const target = Math.atan2(mx, mz);
      let d = target - player.userData.dir;
      while(d>Math.PI) d-=Math.PI*2; while(d<-Math.PI) d+=Math.PI*2;
      player.userData.dir += d*Math.min(1, dt*12);
      player.rotation.y = player.userData.dir;
      player.position.y = Math.abs(Math.sin(clock.elapsedTime*9))*0.08;
    } else player.position.y += (0-player.position.y)*0.2;
  }

  // camera follow (fixed angle)
  camLerp.set(player.position.x, 10, player.position.z+13);
  camera.position.lerp(camLerp, Math.min(1, dt*4));
  camera.lookAt(player.position.x, 1.2, player.position.z-1);

  // spirits bob / leave
  for(const m of spiritMeshes){
    if(m.userData.leaving){
      m.position.y += dt*1.6; m.scale.multiplyScalar(1 - dt*1.2);
      if(m.scale.x < 0.06){ m.visible=false; m.userData.leaving=false;
        if(!state.served.includes(m.userData.data.id)) state.served.push(m.userData.data.id); }
    } else if(m.visible){
      m.userData.bob += dt;
      m.position.y = Math.sin(m.userData.bob*1.6)*0.16 + 0.16;
      m.rotation.y = Math.sin(m.userData.bob*0.5)*0.18;
    }
  }
  // lantern flicker
  for(const L of lanternGlows){
    L.phase += dt;
    const f = 0.85 + Math.sin(L.phase*3.1)*0.13;
    L.light.intensity = L.base*f;
    L.paper.material.emissiveIntensity = f;
  }

  updatePrompt();
  renderer.render(scene, camera);
}

/* ============ boot ============ */
clock = new THREE.Clock();
buildScene();
updateHUD();
animate();

document.getElementById('enterBtn').addEventListener('click', ()=>{
  document.getElementById('start').classList.add('hidden');
});
</script>
</body>
